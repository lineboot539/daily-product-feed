<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Product Feed</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 2.5rem; color: #333; }
    .header p { color: #666; font-size: 1.1rem; }
    .feed { display: flex; flex-direction: column; align-items: center; gap: 30px; max-width: 800px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; width: 100%; }
    .card-img { width: 100%; height: auto; display: block; object-fit: cover; }
    .card-content { padding: 25px; }
    .date { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
    .product-title { font-size: 1.8rem; margin: 0 0 15px 0; color: #222; }
    .copy-cn { margin-bottom: 15px; line-height: 1.6; white-space: pre-wrap; font-size: 1.05rem; }
    .copy-en { color: #666; font-style: italic; line-height: 1.6; white-space: pre-wrap; font-size: 0.95rem; }
    .loading { text-align: center; font-size: 1.2rem; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Daily Product Trends</h1>
    <p>Discover the latest tech & lifestyle gear curated by Bob</p>
  </div>
  <div id="feed" class="feed">
    <div class="loading">Loading latest products...</div>
  </div>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJHrNeoR36Ou6Hwn8GSfU3tWaCfX7_9uEOBz4j8p7EImapRjeKGDAJQHz2Bkfe6vHuVw/exec';
    async function loadFeed() {
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        const feedContainer = document.getElementById('feed');
        feedContainer.innerHTML = '';
        
        const items = Array.isArray(data) ? data : (data.data || []);
        if (items.length === 0) {
          feedContainer.innerHTML = '<div class="loading">No products found. (Or doGet API needs setup)</div>';
          return;
        }

        items.reverse().forEach(item => {
          if (!item.productName) return;
          const card = document.createElement('div');
          card.className = 'card';
          
          let dateStr = item.date ? new Date(item.date).toLocaleDateString() : '';

          card.innerHTML = `
            ${item.imageUrl ? `<img src="${item.imageUrl}" class="card-img" alt="${item.productName}">` : ''}
            <div class="card-content">
              <div class="date">${dateStr}</div>
              <h2 class="product-title">${item.productName}</h2>
              <div class="copy-cn">${item.copyCN || ''}</div>
              <div class="copy-en">${item.copyEN || ''}</div>
            </div>
          `;
          feedContainer.appendChild(card);
        });
      } catch (error) {
        document.getElementById('feed').innerHTML = `<div class="loading">Error loading data. Make sure the Google Apps Script 'doGet' returns JSON.<br>${error}</div>`;
      }
    }
    loadFeed();
  </script>
</body>
</html>
